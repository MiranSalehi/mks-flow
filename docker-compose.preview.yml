services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.preview
    ports:
      - "127.0.0.1:0:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - path: .env.preview
        required: false
    environment:
      PORT: "8080"
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
